apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "postgres-cluster.name" . }}
  namespace: {{ include "postgres-cluster.namespace" . }}
  labels:
    {{- include "postgres-cluster.labels" . | nindent 4 }}
spec:
  # ── Cluster size ──────────────────────────────────────────
  instances: {{ .Values.cluster.instances }}

  # ── PostgreSQL version ────────────────────────────────────
  imageName: {{ .Values.cluster.imageName }}

  # ── Credentials ───────────────────────────────────────────
  superuserSecret:
    name: {{ include "postgres-cluster.secretName" . }}

  # ── PostgreSQL configuration ──────────────────────────────
  postgresql:
    parameters:
      max_connections: {{ .Values.cluster.postgresql.max_connections | quote }}
      shared_buffers: {{ .Values.cluster.postgresql.shared_buffers | quote }}
      effective_cache_size: {{ .Values.cluster.postgresql.effective_cache_size | quote }}
      maintenance_work_mem: {{ .Values.cluster.postgresql.maintenance_work_mem | quote }}
      checkpoint_completion_target: {{ .Values.cluster.postgresql.checkpoint_completion_target | quote }}
      wal_buffers: {{ .Values.cluster.postgresql.wal_buffers | quote }}
      default_statistics_target: {{ .Values.cluster.postgresql.default_statistics_target | quote }}
      random_page_cost: {{ .Values.cluster.postgresql.random_page_cost | quote }}
      effective_io_concurrency: {{ .Values.cluster.postgresql.effective_io_concurrency | quote }}
      work_mem: {{ .Values.cluster.postgresql.work_mem | quote }}
      wal_level: {{ .Values.cluster.postgresql.wal_level | quote }}
      log_connections: {{ .Values.cluster.postgresql.log_connections | quote }}
      log_disconnections: {{ .Values.cluster.postgresql.log_disconnections | quote }}
      log_duration: {{ .Values.cluster.postgresql.log_duration | quote }}
      log_min_duration_statement: {{ .Values.cluster.postgresql.log_min_duration_statement | quote }}

  # ── Bootstrap ─────────────────────────────────────────────
  bootstrap:
    initdb:
      database: {{ .Values.cluster.bootstrap.database }}
      owner: {{ .Values.cluster.bootstrap.owner }}
      secret:
        name: {{ include "postgres-cluster.secretName" . }}
      encoding: {{ .Values.cluster.bootstrap.encoding }}
      localeCType: C
      localeCollate: C

  # ── High Availability ─────────────────────────────────────
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: {{ .Values.cluster.whenUnsatisfiable }}
      labelSelector:
        matchLabels:
          cnpg.io/cluster: {{ include "postgres-cluster.name" . }}

  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: {{ .Values.cluster.podAntiAffinityType }}

  # ── Storage ───────────────────────────────────────────────
  storage:
    storageClass: {{ include "postgres-cluster.storageClassName" . }}
    size: {{ .Values.storage.data.size }}

  {{- if .Values.storage.wal.enabled }}
  walStorage:
    storageClass: {{ include "postgres-cluster.storageClassName" . }}
    size: {{ .Values.storage.wal.size }}
  {{- end }}

  # ── Resources ─────────────────────────────────────────────
  resources:
    requests:
      cpu: {{ .Values.cluster.resources.requests.cpu }}
      memory: {{ .Values.cluster.resources.requests.memory }}
    limits:
      cpu: {{ .Values.cluster.resources.limits.cpu | quote }}
      memory: {{ .Values.cluster.resources.limits.memory }}

  # ── Monitoring ────────────────────────────────────────────
  monitoring:
    enablePodMonitor: {{ .Values.cluster.monitoring.enabled }}

  # ── Switchover settings ───────────────────────────────────
  switchoverDelay: {{ .Values.cluster.switchoverDelay }}
  failoverDelay: {{ .Values.cluster.failoverDelay }}

  {{- if .Values.backup.enabled }}
  # ── Backup ────────────────────────────────────────────────
  backup:
    barmanObjectStore:
      destinationPath: {{ .Values.backup.destinationPath | quote }}
      googleCredentials:
        applicationCredentials:
          name: {{ .Values.backup.credentialSecret }}
          key: credentials.json
      wal:
        compression: gzip
    retentionPolicy: {{ .Values.backup.retentionPolicy | quote }}
  {{- end }}
